<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" id="themeColorMeta" content="#F6F8F7">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F8F7;
    --bg-glow-1: rgba(14,124,123,0.07);
    --bg-glow-2: rgba(217,99,59,0.05);
    --surface:#FFFFFF;
    --ink:#16201E;
    --ink-soft:#5C6B68;
    --ink-faint:#93A09D;
    --line: rgba(22,32,30,0.07);
    --accent:#0E7C7B;
    --accent-bg: rgba(14,124,123,0.09);
    --accent-line: rgba(14,124,123,0.25);
    --warn:#D9633B;
    --shadow: 0 20px 50px -16px rgba(16,32,30,0.16), 0 2px 10px rgba(16,32,30,0.05);
    --overlay: rgba(10,16,15,0.42);
  }
  [data-theme="dark"]{
    --bg:#10151A;
    --bg-glow-1: rgba(45,212,191,0.08);
    --bg-glow-2: rgba(217,99,59,0.06);
    --surface:#1A2128;
    --ink:#EAF2F0;
    --ink-soft:#92A39F;
    --ink-faint:#5D6B68;
    --line: rgba(255,255,255,0.08);
    --accent:#2DD4BF;
    --accent-bg: rgba(45,212,191,0.12);
    --accent-line: rgba(45,212,191,0.3);
    --warn:#FF8B65;
    --shadow: 0 20px 50px -16px rgba(0,0,0,0.55), 0 2px 10px rgba(0,0,0,0.3);
    --overlay: rgba(0,0,0,0.55);
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 85% 8%, var(--bg-glow-1) 0, transparent 45%),
      radial-gradient(circle at 8% 92%, var(--bg-glow-2) 0, transparent 45%),
      var(--bg);
    font-family:'Plus Jakarta Sans', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:84px 18px 60px;
    transition:background 0.3s ease, color 0.3s ease;
  }

  /* ---------- hamburger trigger ---------- */
  .menu-btn{
    position:fixed;
    top:16px; left:12px;
    width:44px; height:44px;
    border-radius:14px;
    background:var(--surface);
    box-shadow:var(--shadow);
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:1000;
  }
  .menu-btn span{ width:18px; height:2px; background:var(--ink); border-radius:2px; margin:2px 0; }

  /* ---------- drawer ---------- */
  .overlay{
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:var(--overlay);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
    z-index:40;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }

  .drawer{
    position:fixed;
    top:0; left:0;
    height:100%;
    width:270px;
    background:var(--surface);
    transform:translateX(-100%);
    transition:transform 0.28s ease;
    z-index:50;
    padding:26px 20px;
    display:flex;
    flex-direction:column;
    box-shadow:var(--shadow);
  }
  .drawer.open{ transform:translateX(0); }

  .drawer-brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding-bottom:20px;
    border-bottom:1px solid var(--line);
    margin-bottom:18px;
  }
  .drawer-brand img{ width:34px; height:34px; border-radius:9px; }
  .drawer-brand span{ font-weight:800; font-size:16px; letter-spacing:0.2px; }

  .drawer-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--ink-faint);
    font-weight:600;
    margin:6px 0 10px;
  }

  .theme-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    background:var(--bg);
    border-radius:14px;
    margin-bottom:22px;
  }
  .theme-row span{ font-size:14px; font-weight:600; }
  .switch{
    width:46px; height:26px;
    background:var(--accent-bg);
    border:1px solid var(--accent-line);
    border-radius:20px;
    position:relative;
    cursor:pointer;
  }
  .switch .knob{
    position:absolute;
    top:2px; left:2px;
    width:20px; height:20px;
    background:var(--accent);
    border-radius:50%;
    transition:left 0.22s ease;
    display:flex; align-items:center; justify-content:center;
    font-size:11px;
  }
  [data-theme="dark"] .switch .knob{ left:22px; }

  .drawer-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 12px;
    border-radius:12px;
    font-size:14.5px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    background:none;
    border:none;
    text-align:left;
    width:100%;
  }
  .drawer-item:hover{ background:var(--bg); }
  .drawer-item .ico{ font-size:17px; width:20px; text-align:center; }

  .drawer-exit{
    margin-top:auto;
    color:var(--warn);
  }

  .exit-hint{
    font-size:11px;
    color:var(--ink-faint);
    text-align:center;
    margin-top:6px;
  }

  /* ---------- main card ---------- */
  .wrap{ width:100%; max-width:380px; }

  .card{
    background:var(--surface);
    border-radius:26px;
    box-shadow:var(--shadow);
    padding:30px 26px 24px;
    transition:background 0.3s ease;
  }

  .title{
    font-size:21px;
    font-weight:800;
    letter-spacing:0.2px;
    margin-bottom:22px;
  }

  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:11.5px;
    font-weight:600;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.6px;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    border:none;
    background:var(--bg);
    border-radius:13px;
    padding:13px 14px;
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    font-weight:600;
    color:var(--ink);
    outline:none;
  }
  .field input::placeholder{ color:var(--ink-faint); font-weight:500; }
  .field input:focus{ box-shadow:0 0 0 2px var(--accent-line); }

  .breakdown{ margin:20px 0 6px; }
  .row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:6px 0;
    font-size:13.5px;
  }
  .row .label{ color:var(--ink-soft); font-weight:500; }
  .row .amt{ font-family:'JetBrains Mono', monospace; font-weight:700; }
  .row.discount .amt{ color:var(--warn); }
  .row.tax .amt{ color:var(--accent); }

  .total-box{
    background:var(--accent-bg);
    border:1px solid var(--accent-line);
    border-radius:16px;
    padding:14px 16px;
    margin-top:14px;
    display:flex;
    flex-direction:row;
    justify-content:space-between;
    align-items:baseline;
  }
  .total-box .cap{
    font-size:11px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--accent);
  }
  .total-box .val{
    font-family:'JetBrains Mono', monospace;
    font-size:27px;
    font-weight:800;
    transition:transform 0.15s ease;
  }
  .total-box .val.pulse{ transform:scale(1.05); }

  .status{
    text-align:center;
    font-size:11.5px;
    color:var(--ink-faint);
    margin-top:12px;
    min-height:14px;
  }
  .status.error{ color:var(--warn); }

  /* ---------- history ---------- */
  /* ---------- history ---------- */
  .history{
    margin-top:16px;
    background:var(--surface);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:18px 20px 16px;
  }
  .history-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .history-head .label{
    font-size:11.5px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--ink-faint);
  }
  .clear-btn{
    background:none;
    border:none;
    font-size:11.5px;
    font-weight:700;
    color:var(--warn);
    cursor:pointer;
    padding:2px 0;
  }
  .hist-empty{
    font-size:13px;
    color:var(--ink-faint);
    text-align:center;
    padding:18px 0;
  }
  .hist-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 4px;
    border-bottom:1px solid var(--line);
  }
  .hist-item:last-child{ border-bottom:none; }
  .hist-main{ font-size:13.5px; font-weight:600; font-family:'JetBrains Mono', monospace; }
  .hist-sub{ font-size:11px; color:var(--ink-faint); margin-top:2px; font-family:'Plus Jakarta Sans', sans-serif; }
  .show-all-btn{
    width:100%;
    background:var(--bg);
    border:none;
    border-radius:12px;
    padding:11px 0;
    margin-top:10px;
    font-size:12.5px;
    font-weight:700;
    color:var(--accent);
    cursor:pointer;
  }

  /* ---------- history page (full-screen push) ---------- */
  .history-page{
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:var(--bg);
    transform:translateX(100%);
    transition:transform 0.32s ease;
    z-index:1100;
    overflow-y:auto;
  }
  .history-page.open{ transform:translateX(0); }
  .history-page-header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:18px 18px;
    background:var(--surface);
    box-shadow:var(--shadow);
    position:sticky;
    top:0;
  }
  .back-btn{
    background:var(--bg);
    border:none;
    width:38px; height:38px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink);
    cursor:pointer;
  }
  .history-page-header h2{
    font-size:17px;
    font-weight:800;
    margin:0;
  }
  .history-page-body{
    padding:18px 20px 40px;
    max-width:420px;
    margin:0 auto;
  }
</style>
</head>
<body>

  <button class="menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="overlay" id="overlay"></div>

  <nav class="drawer" id="drawer">
    <div class="drawer-brand">
      <img src="icon-192.png" alt="">
      <span>Bill Calculator</span>
    </div>

    <div class="drawer-label">Appearance</div>
    <div class="theme-row">
      <span id="themeLabel">Light Mode</span>
      <div class="switch" id="themeSwitch"><div class="knob" id="themeKnob">●</div></div>
    </div>

    <div class="drawer-label">Menu</div>
    <button class="drawer-item" id="historyNavBtn"><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 16 14"></polyline></svg></span>History</button>
    <button class="drawer-item drawer-exit" id="exitBtn"><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"></path><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path></svg></span>Exit</button>
    <div class="exit-hint" id="exitHint" style="visibility:hidden;">use your phone's back button to exit</div>
  </nav>

  <div class="history-page" id="historyPage">
    <div class="history-page-header">
      <button class="back-btn" id="backBtn" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
      <h2>History</h2>
    </div>
    <div class="history-page-body" id="historyPageList"></div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="title">BILL CALCULATOR</div>

      <div class="field">
        <label for="basePrice">Original Price (₹)</label>
        <input type="number" id="basePrice" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <label for="discount">Discount (%)</label>
        <input type="number" id="discount" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <label for="tax">Tax (%)</label>
        <input type="number" id="tax" placeholder="0" inputmode="decimal">
      </div>

      <div class="breakdown">
        <div class="row"><span class="label">Original Price</span><span class="amt" id="lineBase">—</span></div>
        <div class="row discount"><span class="label" id="discountLabel">Discount</span><span class="amt" id="lineDiscount">—</span></div>
        <div class="row"><span class="label">Subtotal</span><span class="amt" id="lineSubtotal">—</span></div>
        <div class="row tax"><span class="label" id="taxLabel">Tax</span><span class="amt" id="lineTax">—</span></div>
      </div>

      <div class="total-box">
        <span class="cap">Final Total</span>
        <span class="val" id="total">—</span>
      </div>

      <div class="status" id="status">enter a price to begin</div>
    </div>

    <div class="history" id="historySection">
      <div class="history-head">
        <span class="label">Recent Calculations</span>
        <button class="clear-btn" id="clearHistoryBtn">Clear</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

<script>
  const apiUrl = "https://price-api-cpkf.onrender.com";

  const basePriceEl = document.getElementById("basePrice");
  const discountEl = document.getElementById("discount");
  const taxEl = document.getElementById("tax");
  const statusEl = document.getElementById("status");
  const totalEl = document.getElementById("total");

  const fmt = (n) => "₹" + Number(n).toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  let debounceTimer = null;

  function resetBreakdown(){
    document.getElementById("lineBase").innerText = "—";
    document.getElementById("discountLabel").innerText = "Discount";
    document.getElementById("lineDiscount").innerText = "—";
    document.getElementById("lineSubtotal").innerText = "—";
    document.getElementById("taxLabel").innerText = "Tax";
    document.getElementById("lineTax").innerText = "—";
    totalEl.innerText = "—";
    statusEl.classList.remove("error");
    statusEl.innerText = "enter a price to begin";
  }

  function renderLocalBreakdown(base, discountPct, taxPct){
    const discountAmt = base * discountPct / 100;
    const subtotal = base - discountAmt;
    const taxAmt = subtotal * taxPct / 100;
    document.getElementById("lineBase").innerText = fmt(base);
    document.getElementById("discountLabel").innerText = `Discount (${discountPct}%)`;
    document.getElementById("lineDiscount").innerText = "−" + fmt(discountAmt);
    document.getElementById("lineSubtotal").innerText = fmt(subtotal);
    document.getElementById("taxLabel").innerText = `Tax (${taxPct}%)`;
    document.getElementById("lineTax").innerText = "+" + fmt(taxAmt);
  }

  async function calculate(save){
    if (basePriceEl.value === ""){ resetBreakdown(); return; }
    const base = parseFloat(basePriceEl.value) || 0;
    const discountPct = parseFloat(discountEl.value) || 0;
    const taxPct = parseFloat(taxEl.value) || 0;

    renderLocalBreakdown(base, discountPct, taxPct);
    statusEl.classList.remove("error");
    statusEl.innerText = "calculating…";

    try{
      const response = await fetch(`${apiUrl}/price?base_price=${base}&discount_percent=${discountPct}&tax_percent=${taxPct}`);
      if (!response.ok) throw new Error("Server error");
      const data = await response.json();

      totalEl.innerText = fmt(data.final_price);
      totalEl.classList.add("pulse");
      setTimeout(() => totalEl.classList.remove("pulse"), 150);
      statusEl.innerText = "confirmed by server ✓";

      if (save) saveHistory(base, discountPct, taxPct, data.final_price);
    }catch(err){
      statusEl.classList.add("error");
      statusEl.innerText = "server is waking up — retrying…";
      setTimeout(() => calculate(save), 4000);
    }
  }

  function scheduleCalculate(){
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => calculate(true), 600);
  }
  [basePriceEl, discountEl, taxEl].forEach(el => el.addEventListener("input", scheduleCalculate));

  /* ---------- history (localStorage) ---------- */
  const HISTORY_KEY = "billcalc-history";

  function getHistory(){
    try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }catch(e){ return []; }
  }
  function saveHistory(base, discountPct, taxPct, finalTotal){
    const list = getHistory();
    list.unshift({ base, discountPct, taxPct, finalTotal, ts: Date.now() });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 20)));
    renderHistory();
  }
  function timeAgo(ts){
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return "just now";
    if (diff < 3600) return Math.floor(diff/60) + "m ago";
    if (diff < 86400) return Math.floor(diff/3600) + "h ago";
    return Math.floor(diff/86400) + "d ago";
  }
  function renderHistory(){
    const list = getHistory();
    const container = document.getElementById("historyList");
    if (list.length === 0){
      container.innerHTML = `<div class="hist-empty">Your past calculations will appear here</div>`;
      return;
    }
    const visible = list.slice(0, 2);
    let html = visible.map(itemHtml).join("");
    if (list.length > visible.length){
      html += `<button class="show-all-btn" id="showAllBtn">Show All</button>`;
    }
    container.innerHTML = html;

    const showAllBtn = document.getElementById("showAllBtn");
    if (showAllBtn) showAllBtn.addEventListener("click", openHistoryPage);

    renderHistoryPage();
  }
  function renderHistoryPage(){
    const list = getHistory();
    const pageContainer = document.getElementById("historyPageList");
    if (!pageContainer) return;
    pageContainer.innerHTML = list.length === 0
      ? `<div class="hist-empty">Your past calculations will appear here</div>`
      : list.map(itemHtml).join("");
  }
  function clearHistory(){
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }
  function itemHtml(item){
    return `<div class="hist-item">
      <div>
        <div class="hist-main">${fmt(item.base)} → ${fmt(item.finalTotal)}</div>
        <div class="hist-sub">${item.discountPct}% off · ${item.taxPct}% tax · ${timeAgo(item.ts)}</div>
      </div>
    </div>`;
  }

  /* ---------- theme ---------- */
  const THEME_KEY = "billcalc-theme";
  const root = document.documentElement;
  const themeLabel = document.getElementById("themeLabel");
  const themeMeta = document.getElementById("themeColorMeta");

  function applyTheme(theme){
    root.setAttribute("data-theme", theme);
    themeLabel.innerText = theme === "dark" ? "Dark Mode" : "Light Mode";
    themeMeta.setAttribute("content", theme === "dark" ? "#10151A" : "#F6F8F7");
    localStorage.setItem(THEME_KEY, theme);
  }
  function initTheme(){
    const saved = localStorage.getItem(THEME_KEY);
    if (saved){ applyTheme(saved); return; }
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(prefersDark ? "dark" : "light");
  }
  document.getElementById("themeSwitch").addEventListener("click", () => {
    const current = root.getAttribute("data-theme");
    applyTheme(current === "dark" ? "light" : "dark");
  });

  /* ---------- drawer ---------- */
  const drawer = document.getElementById("drawer");
  const overlay = document.getElementById("overlay");
  function openDrawer(){ drawer.classList.add("open"); overlay.classList.add("show"); }
  function closeDrawer(){ drawer.classList.remove("open"); overlay.classList.remove("show"); }
  document.getElementById("menuBtn").addEventListener("click", openDrawer);
  overlay.addEventListener("click", closeDrawer);

  /* ---------- history page (full-screen push navigation) ---------- */
  const historyPage = document.getElementById("historyPage");

  function openHistoryPage(){
    closeDrawer();
    renderHistoryPage();
    historyPage.classList.add("open");
    history.pushState({ page: "history" }, "");
  }
  function closeHistoryPage(){
    historyPage.classList.remove("open");
  }
  window.addEventListener("popstate", () => {
    closeHistoryPage();
  });

  document.getElementById("backBtn").addEventListener("click", () => {
    history.back();
  });

  document.getElementById("historyNavBtn").addEventListener("click", openHistoryPage);
  document.getElementById("clearHistoryBtn").addEventListener("click", clearHistory);

  document.getElementById("exitBtn").addEventListener("click", () => {
    window.close();
    const hint = document.getElementById("exitHint");
    hint.style.visibility = "visible";
    setTimeout(() => hint.style.visibility = "hidden", 2500);
  });

  /* ---------- init ---------- */
  initTheme();
  resetBreakdown();
  renderHistory();

  if ("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
  }
</script>

</body>
</html>
